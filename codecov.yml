coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        target: 80%
        threshold: 5%
        informational: true

  precision: 2
  round: down
  range: "70...90"

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: true

ignore:
  - "tests/"
  - "scripts/"
  - "demos/"
  - "docs/"
  - "knowledge/"
  - "**/__init__.py"
