type: gnn
output_mode: soft_priors
gnn:
  layers: 4
  hidden_dim: 64
  message_fn: residual_mlp
  aggregation: mean
  normalization: layer
  residual: true
  edge_features: [syndrome_bit, round_idx]
head: mlp_small
training:
  learning_rate: 5.0e-4
  batch_size: 128
  epochs: 5
  loss: bce
  profile: dev

