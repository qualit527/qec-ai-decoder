name: bb72_depol
code:
  type: parity_check_matrix
  source: circuits/bb72_Hx.npy
noise:
  type: depolarizing
  p: [1.0e-3, 3.0e-3, 5.0e-3]
  seed_policy:
    train: [1, 999]
    val: [1000, 1999]
    holdout: [9000, 9999]
constraints:
  # latency_flops_budget and param_budget intentionally omitted - no hard
  # caps on model size or per-syndrome FLOPs. Optimize for delta_ler within
  # the wall-clock budget only.
  target_ler: 1.0e-4
  target_p: 1.0e-3
baseline_decoders:
  - bposd
  - relay_bp
classical_backend: osd
eval_protocol:
  min_shots_train: 1000000
  min_shots_val: 100000
  min_shots_verify: 200000
  bootstrap_ci: 0.95
  osd_orders_reported: [0, 10]
  x_z_decoding: circuit
